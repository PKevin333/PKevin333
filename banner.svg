<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#060210"/>
    </radialGradient>
    <radialGradient id="tL" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tR" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes torch{0%,100%{opacity:0.85;transform:scaleY(1)}50%{opacity:1;transform:scaleY(1.12)}}
      @keyframes torchGlow{0%,100%{opacity:0.35}50%{opacity:0.55}}
      @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      @keyframes barFill{0%{width:0}to{width:75px}}
      @keyframes barFill2{0%{width:0}to{width:120px}}
      .tfl{animation:torch 0.35s ease-in-out infinite;transform-origin:91px 68px}
      .tfr{animation:torch 0.35s ease-in-out infinite 0.2s;transform-origin:817px 68px}
      .gl{animation:torchGlow 0.5s ease-in-out infinite}
      .gr{animation:torchGlow 0.5s ease-in-out infinite 0.15s}
      .title{animation:fadeIn 0.8s ease forwards 0.3s;opacity:0}
      .sub{animation:fadeIn 0.8s ease forwards 0.8s;opacity:0}
      .cls{animation:fadeIn 0.8s ease forwards 0.1s;opacity:0}
      .bar1{animation:barFill 1.5s ease forwards 1s;width:0}
      .bar2{animation:barFill2 2s ease forwards 1.2s;width:0}
    </style>
  </defs>

  <rect width="900" height="200" fill="url(#bg)"/>

  <rect x="0" y="0" width="900" height="200" fill="none" stroke="#3d1a5a" stroke-width="1.5"/>
  <rect x="0" y="0" width="14" height="14" fill="#060210" stroke="#3d1a5a" stroke-width="1"/>
  <rect x="886" y="0" width="14" height="14" fill="#060210" stroke="#3d1a5a" stroke-width="1"/>
  <rect x="0" y="186" width="14" height="14" fill="#060210" stroke="#3d1a5a" stroke-width="1"/>
  <rect x="886" y="186" width="14" height="14" fill="#060210" stroke="#3d1a5a" stroke-width="1"/>

  <ellipse cx="91" cy="200" rx="120" ry="100" fill="url(#tL)" class="gl"/>
  <ellipse cx="817" cy="200" rx="120" ry="100" fill="url(#tR)" class="gr"/>

  <rect x="86" y="90" width="10" height="70" fill="#4a2800" rx="2"/>
  <rect x="82" y="78" width="18" height="16" fill="#5a3200" rx="2"/>
  <polygon points="82,78 91,42 100,78" fill="#cc5500" class="tfl"/>
  <polygon points="85,75 91,48 97,75" fill="#ff8800" opacity="0.95" class="tfl"/>
  <polygon points="87,72 91,54 95,72" fill="#ffcc44" opacity="0.8" class="tfl"/>

  <rect x="808" y="90" width="10" height="70" fill="#4a2800" rx="2"/>
  <rect x="804" y="78" width="18" height="16" fill="#5a3200" rx="2"/>
  <polygon points="804,78 817,42 828,78" fill="#cc5500" class="tfr"/>
  <polygon points="809,75 817,48 825,75" fill="#ff8800" opacity="0.95" class="tfr"/>
  <polygon points="811,72 817,54 823,72" fill="#ffcc44" opacity="0.8" class="tfr"/>

  <rect x="0" y="162" width="900" height="38" fill="#040110"/>
  <line x1="0" y1="162" x2="900" y2="162" stroke="#3d1a5a" stroke-width="1"/>

  <rect x="20" y="172" width="120" height="7" fill="#0d0520" rx="1" stroke="#3d1a5a" stroke-width="0.5"/>
  <rect x="20" y="172" height="7" fill="#7c3aed" rx="1" class="bar1"/>
  <text x="20" y="188" fill="#4c1d95" font-size="9" font-family="Courier New, monospace">HP  75%  ]</text>

  <rect x="760" y="172" width="120" height="7" fill="#0d0520" rx="1" stroke="#3d1a5a" stroke-width="0.5"/>
  <rect x="760" y="172" height="7" fill="#6d28d9" rx="1" class="bar2"/>
  <text x="726" y="188" fill="#4c1d95" font-size="9" font-family="Courier New, monospace">[ XP</text>
  <text x="882" y="188" fill="#4c1d95" font-size="9" font-family="Courier New, monospace">100%</text>

  <text x="450" y="78" text-anchor="middle" font-family="Courier New, monospace" font-size="9" font-weight="700" fill="#7c3aed" letter-spacing="4" class="cls">&#9670; CLASSE: DESENVOLVEDOR · RANK S &#9670;</text>
  <text x="450" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#f5f0ff" class="title" filter="url(#glow)">Kevin Silva Lopes</text>
  <text x="450" y="138" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#6d28d9" letter-spacing="3" class="sub">Administração · Tecnologia · Dados · IA</text>
</svg>
